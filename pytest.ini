[pytest]
# Configuração do pytest

# Diretório de testes
testpaths = tests

# Padrão de nomes dos testes
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados
markers =
    e2e: Marca testes End-to-End (requerem browser real)
    integration: Marca testes de integração
    unit: Marca testes unitários
    slow: Marca testes lentos

# Cobertura
addopts = --cov=src --cov-report=term-missing --cov-report=html

# Mínimo de cobertura esperado
[coverage:run]
branch = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
